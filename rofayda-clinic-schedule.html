<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">

<title>Rofayda — Clinic Schedules</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --teal:#51A9B5;
  --teal-deep:#1B4B52;
  --teal-mid:#3A8793;
  --header-teal:#4E9596;
  --mint:#E4F1F2;
  --mint-2:#D2E8EA;
  --grad-top:#FFFFFF;
  --grad-bot:#9BD3CA;
  --panel:rgba(255,255,255,.55);
  --panel-border:rgba(255,255,255,.7);
  --pill:rgba(255,255,255,.75);
  --sand:#F7F4EE;
  --ink:#23383B;
  --muted:#5E7779;
  --accent:#E0894C;
  --accent-soft:#F6E2D0;
  --yellow:#F2D28C;
  --white:#fff;
  --shadow:0 4px 18px rgba(27,75,82,.10);
  --shadow-lg:0 14px 44px rgba(27,75,82,.16);
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,var(--grad-top) 0%,#EAF6F4 30%,#C2E4DE 62%,var(--grad-bot) 100%);
  background-attachment:fixed;
  color:var(--ink);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  min-height:100vh;
}
body[dir="rtl"]{font-family:'IBM Plex Sans Arabic',sans-serif;}
body[dir="rtl"] .serif{font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:600;}
.serif{font-family:'Fraunces',serif;}

/* ---------- background calligraphy motif ---------- */
.bg-motif{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.bg-motif img{
  position:absolute;opacity:.05;
}
.bg-motif .m1{width:640px;top:30%;right:-180px;transform:rotate(8deg);}
.bg-motif .m2{width:520px;bottom:-120px;left:-150px;transform:rotate(-12deg);}

.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 20px;}

/* ---------- top bar ---------- */
header.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.6);
}
.topbar-inner{
  max-width:1080px;margin:0 auto;padding:11px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
.brand img{height:38px;width:auto;display:block;}
.lang-toggle{
  display:flex;align-items:center;background:var(--white);
  border:1px solid var(--mint-2);border-radius:999px;padding:3px;gap:2px;
  box-shadow:var(--shadow);
}
.lang-toggle button{
  border:0;background:transparent;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);
  padding:6px 14px;border-radius:999px;transition:.2s;
}
.lang-toggle button.active{background:var(--teal);color:#fff;}

/* ---------- hero / landing ---------- */
.hero{text-align:center;padding:46px 0 26px;}
.hero .logo-big{height:92px;width:auto;margin:0 auto 20px;display:block;}
.hero h1{
  font-size:clamp(26px,4.6vw,40px);font-weight:600;letter-spacing:.02em;
  color:var(--teal-deep);line-height:1.14;margin-bottom:16px;
}
.hero .specialty-banner{
  display:inline-block;font-weight:700;color:var(--teal-deep);
  font-size:clamp(15px,2.6vw,20px);line-height:1.5;
  background:linear-gradient(180deg,transparent 12%,var(--yellow) 12% 88%,transparent 88%);
  padding:0 10px;margin-bottom:14px;max-width:680px;
}
.hero p{font-size:clamp(14px,2.3vw,17px);color:var(--muted);max-width:540px;margin:6px auto 0;}

/* ---------- link-tree cards ---------- */
.tree{display:flex;flex-direction:column;gap:14px;max-width:580px;margin:34px auto 0;}
.tree-eyebrow{
  text-align:center;font-size:13px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--header-teal);margin-bottom:6px;
}
body[dir="rtl"] .tree-eyebrow{letter-spacing:.04em;}
.branch-card{
  display:flex;align-items:center;gap:18px;
  background:var(--panel);border:1.5px solid var(--panel-border);
  border-radius:22px;padding:20px 22px;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .22s cubic-bezier(.2,.8,.2,1),box-shadow .22s;
  text-align:left;width:100%;font-family:inherit;backdrop-filter:blur(6px);
}
body[dir="rtl"] .branch-card{text-align:right;}
.branch-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);background:rgba(255,255,255,.72);}
.branch-card:focus-visible{outline:3px solid var(--teal);outline-offset:3px;}
.branch-ico{
  flex:none;width:54px;height:54px;border-radius:15px;
  background:linear-gradient(135deg,var(--teal),var(--teal-mid));
  display:grid;place-items:center;color:#fff;
  box-shadow:0 4px 12px rgba(58,135,147,.3);
}
.branch-ico svg{width:28px;height:28px;}
.branch-meta{flex:1;min-width:0;}
.branch-meta h3{font-size:17.5px;font-weight:700;color:var(--teal-deep);margin-bottom:2px;}
.branch-meta span{font-size:13.5px;color:var(--muted);}
.branch-count{
  flex:none;font-size:13px;font-weight:600;color:var(--teal-mid);
  background:rgba(255,255,255,.85);padding:5px 12px;border-radius:999px;white-space:nowrap;
}
.branch-arrow{flex:none;color:var(--teal-mid);opacity:.5;transition:.2s;}
.branch-card:hover .branch-arrow{opacity:1;transform:translateX(3px);}
body[dir="rtl"] .branch-card:hover .branch-arrow{transform:translateX(-3px) scaleX(-1);}
body[dir="rtl"] .branch-arrow{transform:scaleX(-1);}

.tree-foot{text-align:center;margin:30px auto 0;max-width:580px;}
.view-all-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.6);border:1.5px solid var(--teal);color:var(--teal-deep);
  font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;
  padding:11px 22px;border-radius:999px;transition:.2s;backdrop-filter:blur(6px);
}
.view-all-btn:hover{background:var(--teal);color:#fff;}

/* ---------- schedule view ---------- */
.schedule{display:none;padding:30px 0 60px;}
.schedule.active{display:block;animation:fade .4s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.back-btn{
  display:inline-flex;align-items:center;gap:7px;background:none;border:0;
  cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;
  color:var(--teal-mid);padding:6px 0;margin-bottom:18px;
}
.back-btn:hover{color:var(--teal-deep);}
body[dir="rtl"] .back-btn svg{transform:scaleX(-1);}

.sched-head{margin-bottom:24px;}
.sched-head h2{font-size:clamp(22px,4vw,32px);font-weight:700;color:var(--teal-deep);letter-spacing:.02em;}
.sched-head p{color:var(--muted);font-size:15px;margin-top:3px;}

/* filter bar */
.filters{
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  background:rgba(255,255,255,.6);border:1.5px solid var(--panel-border);
  border-radius:18px;padding:14px;margin-bottom:8px;box-shadow:var(--shadow);
  backdrop-filter:blur(8px);
}
.filter-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:160px;}
.filter-group label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--header-teal);}
body[dir="rtl"] .filter-group label{letter-spacing:0;text-transform:none;}
.filter-group select,.search-box input{
  font-family:inherit;font-size:14.5px;color:var(--ink);
  border:1.5px solid rgba(78,149,150,.3);border-radius:12px;padding:10px 12px;
  background:rgba(255,255,255,.8);transition:.18s;width:100%;
}
.filter-group select:focus,.search-box input:focus{
  outline:0;border-color:var(--teal);background:#fff;
}
.search-box{flex:2;min-width:200px;display:flex;flex-direction:column;gap:5px;}
.result-count{font-size:13px;color:var(--muted);margin:14px 2px 18px;}
.result-count b{color:var(--teal-deep);}

/* clinic cards grid */
.clinic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px;}
.clinic-card{
  background:rgba(255,255,255,.62);border:1.5px solid var(--panel-border);
  border-radius:20px;padding:20px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:14px;transition:transform .2s,box-shadow .2s;
  backdrop-filter:blur(8px);
}
.clinic-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.cc-head{display:flex;align-items:flex-start;gap:13px;}
.cc-head-text{display:flex;flex-direction:column;gap:7px;align-items:flex-start;min-width:0;}
.cc-tags{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.cc-sub{
  font-size:11px;font-weight:600;color:var(--accent);
  background:var(--accent-soft);padding:4px 10px;border-radius:999px;white-space:nowrap;
}
.cc-photo{
  width:60px;height:60px;border-radius:50%;object-fit:cover;flex:none;
  border:2px solid rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(27,75,82,.18);
}
.cc-spec{
  font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--header-teal);background:rgba(255,255,255,.85);
  border:1.5px solid rgba(78,149,150,.35);
  padding:5px 12px;border-radius:999px;
}
body[dir="rtl"] .cc-spec{letter-spacing:0;text-transform:none;}
.cc-room{font-size:12.5px;color:var(--muted);white-space:nowrap;padding-top:4px;}
.cc-doctor{font-size:19px;font-weight:700;color:var(--teal-deep);line-height:1.2;}
.cc-cred{font-size:12.5px;color:var(--muted);font-weight:500;line-height:1.35;margin-top:-3px;}
.cc-note{font-size:12px;color:var(--accent);font-weight:600;margin-top:-6px;}
.cc-branch{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-top:-8px;}
.cc-branch svg{width:14px;height:14px;flex:none;color:var(--teal-mid);}

.cc-slots{display:flex;flex-direction:column;gap:7px;border-top:1px solid rgba(78,149,150,.18);padding-top:13px;}
.slot{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.slot-day{
  display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--ink);
}
.slot-day .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex:none;}
.slot-day.today .dot{background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.slot-day.today{color:var(--accent);}
.slot-time{font-size:13.5px;color:var(--muted);font-variant-numeric:tabular-nums;}
.slot-time--tbd{font-size:12px;color:var(--teal-mid);font-style:italic;opacity:.85;}
.slot-noTime{font-size:12px;color:var(--muted);opacity:.7;font-style:italic;}
.today-tag{
  font-size:10px;font-weight:700;color:#fff;background:var(--accent);
  padding:2px 7px;border-radius:6px;letter-spacing:.04em;
}

.cc-actions{display:flex;gap:9px;margin-top:2px;}
.cc-actions a{
  flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;
  font-family:inherit;font-size:14px;font-weight:600;text-decoration:none;
  padding:11px;border-radius:12px;transition:.18s;
}
.btn-call{background:var(--teal);color:#fff;}
.btn-call:hover{background:var(--teal-mid);}
.btn-wa{background:#25D366;color:#fff;}
.btn-wa:hover{filter:brightness(.94);}
.cc-actions svg{width:16px;height:16px;}

.empty{
  text-align:center;padding:60px 20px;color:var(--muted);
  grid-column:1/-1;
}
.empty svg{width:48px;height:48px;color:var(--teal-mid);opacity:.4;margin-bottom:14px;}

footer{
  text-align:center;padding:30px 20px 40px;color:var(--muted);font-size:12.5px;
  position:relative;z-index:1;
}
footer .serif{color:var(--teal-mid);}
.footer-phone{
  display:inline-flex;align-items:center;gap:8px;font-size:22px;font-weight:700;
  color:var(--teal-deep);margin-bottom:10px;text-decoration:none;letter-spacing:.02em;
}
.footer-phone svg{width:20px;height:20px;}
.footer-phone:hover{color:var(--teal);}

@media(max-width:560px){
  .clinic-grid{grid-template-columns:1fr;}
  .filters{flex-direction:column;align-items:stretch;}
  .hero{padding:38px 0 22px;}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;scroll-behavior:auto!important;}
}
</style>

const DAYS = [
  {id:"sat",en:"Saturday",ar:"السبت"},
  {id:"sun",en:"Sunday",ar:"الأحد"},
  {id:"mon",en:"Monday",ar:"الاثنين"},
  {id:"tue",en:"Tuesday",ar:"الثلاثاء"},
  {id:"wed",en:"Wednesday",ar:"الأربعاء"},
  {id:"thu",en:"Thursday",ar:"الخميس"},
  {id:"fri",en:"Friday",ar:"الجمعة"},
];
const JS_DAY_TO_ID = ["sun","mon","tue","wed","thu","fri","sat"];
const todayId = JS_DAY_TO_ID[new Date().getDay()];

let lang = "en";
const T = {
  en:{call:"Call",wa:"WhatsApp",today:"Today",all:"All",allBuildings:"All buildings",
      clinicsAt:"clinics at",clinic:"clinic",clinics:"clinics",found:"found",
      none:"No clinics match your filters.",reset:"Clear filters",byAppt:"Call to confirm time",allSubs:"All sub-specialties",
      everyClinic:"Every clinic across all three buildings"},
  ar:{call:"اتصال",wa:"واتساب",today:"اليوم",all:"الكل",allBuildings:"كل المباني",
      clinicsAt:"عيادة في",clinic:"عيادة",clinics:"عيادة",found:"",
      none:"لا توجد عيادات مطابقة لبحثك.",reset:"مسح الفلاتر",byAppt:"اتصل لتأكيد الموعد",allSubs:"كل التخصصات الدقيقة",
      everyClinic:"جميع العيادات في المباني الثلاثة"},
};
const L=(o,f)=>o[f+"_"+lang]||o[f+"_en"];
const dayName=(id)=>{const d=DAYS.find(x=>x.id===id);return d?d[lang]:id;};
const specName=(id)=>{const s=SPECIALTIES.find(x=>x.id===id);return s?L(s,"name"):id;};
const subName=(id)=>{const s=(typeof SUBSPECIALTIES!=="undefined")?SUBSPECIALTIES.find(x=>x.id===id):null;return s?L(s,"name"):id;};
// sub-specialties that exist for a given specialty (only those actually used by a clinic)
function subsFor(specId){
  if(typeof SUBSPECIALTIES==="undefined")return [];
  const used=new Set(CLINICS.filter(c=>c.specialty===specId&&c.sub).map(c=>c.sub));
  return SUBSPECIALTIES.filter(s=>s.parent===specId&&used.has(s.id));
}
const branchName=(id)=>{const b=BRANCHES.find(x=>x.id===id);return b?L(b,"name"):id;};

/* ---------------- build landing ---------------- */
function clinicsInBranch(id){return CLINICS.filter(c=>c.branch===id).length;}
function buildingIcon(id){
  const icons={
    clinic:'<path d="M3 21h18M5 21V7l8-4 8 4v14M9 9h.01M9 13h.01M9 17h.01M15 9h.01M15 13h.01M15 17h.01"/>',
    hospital:'<path d="M3 21h18M4 21V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v16M12 7v6M9 10h6"/>',
    maternity:'<path d="M12 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM12 8v8M9 12h6M8 21c0-2 1.8-3 4-3s4 1 4 3"/>',
  };
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+(icons[id]||icons.hospital)+'</svg>';
}
/* ---------------- filters ---------------- */
function fillSelect(sel,items,allLabel){
  sel.innerHTML="";
  const o=document.createElement("option");o.value="all";o.textContent=allLabel;sel.appendChild(o);
  items.forEach(it=>{const op=document.createElement("option");op.value=it.id;op.textContent=it.label;sel.appendChild(op);});
}
function buildFilters(){
  // only specialties that exist, in their defined order
  const usedSpec=[...new Set(CLINICS.map(c=>c.specialty))];
  fillSelect(document.getElementById("f-spec"),
    SPECIALTIES.filter(s=>usedSpec.includes(s.id)).map(s=>({id:s.id,label:L(s,"name")})),T[lang].all);
  fillSelect(document.getElementById("f-day"),
    DAYS.map(d=>({id:d.id,label:d[lang]})),T[lang].all);
}

// when the main specialty changes, populate + show/hide the sub-specialty filter
function onSpecChange(){
  const spec=document.getElementById("f-spec").value;
  const grp=document.getElementById("f-sub-group");
  const sel=document.getElementById("f-sub");
  const subs=spec==="all"?[]:subsFor(spec);
  if(subs.length){
    fillSelect(sel, subs.map(s=>({id:s.id,label:L(s,"name")})), T[lang].allSubs);
    grp.style.display="";
  }else{
    sel.innerHTML="";
    grp.style.display="none";
  }
  render();
}

function fmtTime(t){
  if(lang==="ar")return t; // keep 24h numerals; Arabic readers handle fine
  let[h,m]=t.split(":").map(Number);
  const ap=h>=12?"PM":"AM";let hh=h%12;if(hh===0)hh=12;
  return hh+":"+String(m).padStart(2,"0")+" "+ap;
}
function waLink(num,doctor){
  const msg=lang==="en"
    ? "Hello, I'd like to book an appointment with "+doctor+"."
    : "السلام عليكم، أرغب في حجز موعد مع "+doctor+".";
  return "https://wa.me/"+num+"?text="+encodeURIComponent(msg);
}

function render(){
  const fs=document.getElementById("f-spec").value;
  const fsub=document.getElementById("f-sub").value;
  const subActive=document.getElementById("f-sub-group").style.display!=="none";
  const fd=document.getElementById("f-day").value;
  const q=document.getElementById("f-search").value.trim().toLowerCase();

  let list=CLINICS.filter(c=>{
    if(fs!=="all"&&c.specialty!==fs)return false;
    if(subActive&&fsub&&fsub!=="all"&&c.sub!==fsub)return false;
    if(fd!=="all"&&!c.slots.some(s=>s.day===fd))return false;
    if(q){
      const hay=(c.doctor_en+" "+c.doctor_ar+" "+specName(c.specialty)+" "+
                 (c.sub?subName(c.sub)+" ":"")+
                 (SPECIALTIES.find(s=>s.id===c.specialty)?.name_en||"")+" "+
                 (c.sub?(SUBSPECIALTIES.find(s=>s.id===c.sub)?.name_en||""):"")).toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });

  // order cards by earliest working day (week starts Saturday), then start time, then name
  const dayRank=DAYS.map(d=>d.id);
  const earliest=c=>{
    let best=99, bestT="99:99";
    c.slots.forEach(s=>{
      const r=dayRank.indexOf(s.day);
      if(r<best || (r===best && (s.from||"99:99")<bestT)){ best=r; bestT=s.from||"99:99"; }
    });
    return [best,bestT];
  };
  list.sort((a,b2)=>{
    const ea=earliest(a), eb=earliest(b2);
    if(ea[0]!==eb[0])return ea[0]-eb[0];
    if(ea[1]!==eb[1])return ea[1]<eb[1]?-1:1;
    return a.doctor_en.localeCompare(b2.doctor_en);
  });

  const grid=document.getElementById("clinic-grid");
  const rc=document.getElementById("result-count");
  grid.innerHTML="";

  if(list.length===0){
    rc.textContent="";
    grid.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <p>${T[lang].none}</p></div>`;
    return;
  }

  const n=list.length;
  rc.innerHTML = lang==="en"
    ? `<b>${n}</b> ${n===1?T.en.clinic:T.en.clinics} ${T.en.found}`
    : `<b>${n}</b> ${T.ar.clinics}`;

  list.forEach(c=>{
    const b=BRANCHES.find(x=>x.id===c.branch);
    // sort slots by day order
    const order=DAYS.map(d=>d.id);
    const slots=[...c.slots].sort((a,b2)=>order.indexOf(a.day)-order.indexOf(b2.day));
    const slotsHTML=slots.map(s=>{
      const isToday=s.day===todayId&&(fd==="all"||fd===todayId);
      const timeHTML = (s.from&&s.to)
        ? `<span class="slot-time">${fmtTime(s.from)} – ${fmtTime(s.to)}</span>`
        : `<span class="slot-time slot-time--tbd">${T[lang].byAppt}</span>`;
      return `<div class="slot">
        <span class="slot-day${isToday?' today':''}"><span class="dot"></span>${dayName(s.day)}${isToday?` <span class="today-tag">${T[lang].today}</span>`:''}</span>
        ${timeHTML}
      </div>`;
    }).join("");

    const card=document.createElement("div");
    card.className="clinic-card";
    const photoHTML = c.photo ? `<img class="cc-photo" src="${c.photo}" alt="${L(c,'doctor')}" loading="lazy">` : "";
    card.innerHTML=`
      <div class="cc-head">
        ${photoHTML}
        <div class="cc-head-text">
          <div class="cc-tags">
            <span class="cc-spec">${specName(c.specialty)}</span>
            ${c.sub?`<span class="cc-sub">${subName(c.sub)}</span>`:""}
          </div>
          <div class="cc-doctor">${L(c,"doctor")}</div>
          ${c.credentials_en?`<div class="cc-cred">${L(c,"credentials")}</div>`:""}
          ${c.note_en?`<div class="cc-note">${L(c,"note")}</div>`:""}
        </div>
      </div>
      <div class="cc-branch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${L(b,"name")} · ${L(c,"room")}
      </div>
      <div class="cc-slots">${slotsHTML}</div>
      <div class="cc-actions">
        <a class="btn-call" href="tel:${b.phone.replace(/\s/g,'')}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          ${T[lang].call}
        </a>
        <a class="btn-wa" href="${waLink(b.whatsapp,L(c,'doctor'))}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.945C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 0 1 8.413 3.488 11.82 11.82 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.82 9.82 0 0 0 1.523 5.255l-.999 3.648 3.965-1.04zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.612-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/></svg>
          ${T[lang].wa}
        </a>
      </div>`;
    grid.appendChild(card);
  });
}

/* ---------------- language ---------------- */
function applyI18n(){
  document.querySelectorAll("[data-en]").forEach(el=>{
    const v=el.getAttribute("data-"+lang);
    if(v!==null)el.textContent=v;
  });
  const search=document.getElementById("f-search");
  if(search)search.placeholder=search.getAttribute("data-ph-"+lang)||"";
}
function setLang(l){
  // preserve current filter selections across language switch
  const prev={spec:document.getElementById("f-spec").value,
              sub:document.getElementById("f-sub").value,
              day:document.getElementById("f-day").value,
              q:document.getElementById("f-search").value};
  lang=l;
  document.body.dir=(l==="ar")?"rtl":"ltr";
  document.documentElement.lang=l;
  document.getElementById("lang-en").classList.toggle("active",l==="en");
  document.getElementById("lang-ar").classList.toggle("active",l==="ar");
  applyI18n();
  buildFilters();
  document.getElementById("f-spec").value=prev.spec;
  onSpecChange();                                  // rebuild sub-specialty list in new language
  document.getElementById("f-sub").value=prev.sub; // restore sub selection
  document.getElementById("f-day").value=prev.day;
  document.getElementById("f-search").value=prev.q;
  render();
}

/* ---------------- init ---------------- */
applyI18n();
buildFilters();
render();
</script>
